<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — LiplnwZa</title>
  <meta name="description" content="Get in touch with LiplnwZa for AI agent development and automation inquiries." />
  
  <!-- Open Graph -->
  <meta property="og:title" content="Contact — LiplnwZa" />
  <meta property="og:description" content="Get in touch with LiplnwZa for AI agent development and automation inquiries." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://liplnwza.vercel.app/contact.html" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body data-page="contact">
  {{> nav}}

  <!-- Main Content Area -->
  <main class="page-content">
    <div class="container">
      <div class="section-header page-hero animate-on-scroll">
        <span class="section-label">Connect</span>
        <h1 class="section-title">Start a Project</h1>
        <p class="section-subtitle">Tell us about your automation needs or project ideas. The AI team will respond swiftly.</p>
      </div>

      <!-- Contact Form Container -->
      <div class="contact-container animate-on-scroll">
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form form" id="contact-form">
          <!-- Formspree Config Note: Replace YOUR_FORM_ID with your actual Formspree endpoint ID -->
          
          <div class="form__group">
            <label for="name" class="form__label">Name</label>
            <input type="text" name="name" id="name" class="form__input" placeholder="Your name" required />
          </div>

          <div class="form__group">
            <label for="email" class="form__label">Email Address</label>
            <input type="email" name="email" id="email" class="form__input" placeholder="you@example.com" required />
          </div>

          <div class="form__group">
            <label for="message" class="form__label">Message</label>
            <textarea name="message" id="message" class="form__textarea" rows="6" placeholder="Describe your project, operations, or automation needs..." required></textarea>
          </div>

          <!-- Honeypot anti-spam field -->
          <div class="form__honeypot">
            <label for="_gotcha">Leave this empty if you are human</label>
            <input type="text" name="_gotcha" id="_gotcha" tabindex="-1" autocomplete="off" />
          </div>

          <div class="form__actions">
            <button type="submit" class="btn btn--primary" id="form-submit" style="width: 100%;">Send Message</button>
          </div>

          <div class="form__status" id="form-status"></div>
        </form>
      </div>
    </div>
  </main>

  {{> footer}}

  <script type="module" src="/src/main.js"></script>
</body>
</html>
