<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ติดต่อ — LiplnwZa</title>
  <meta name="description" content="ติดต่อ LiplnwZa เพื่อสอบถามเกี่ยวกับการพัฒนา AI agent และระบบอัตโนมัติ" />
  
  <!-- Open Graph -->
  <meta property="og:title" content="ติดต่อ — LiplnwZa" />
  <meta property="og:description" content="ติดต่อ LiplnwZa เพื่อสอบถามเกี่ยวกับการพัฒนา AI agent และระบบอัตโนมัติ" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://liplnwza.vercel.app/contact.html" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body data-page="contact">
  {{> nav}}

  <!-- Main Content Area -->
  <main class="page-content">
    <div class="container">
      <div class="section-header page-hero animate-on-scroll">
        <span class="section-label">ช่องทางติดต่อ</span>
        <h1 class="section-title">เริ่มโปรเจกต์ใหม่</h1>
        <p class="section-subtitle">แจ้งความต้องการเกี่ยวกับระบบอัตโนมัติหรือไอเดียโปรเจกต์ของคุณ ทีม AI จะตอบกลับอย่างรวดเร็ว</p>
      </div>

      <!-- Contact Form Container -->
      <div class="contact-container animate-on-scroll">
        <form action="https://formspree.io/f/xvzydnre" method="POST" class="contact-form form" id="contact-form">
          <!-- Formspree Config Note: Replace YOUR_FORM_ID with your actual Formspree endpoint ID -->
          
          <div class="form__group">
            <label for="name" class="form__label">ชื่อของคุณ</label>
            <input type="text" name="name" id="name" class="form__input" placeholder="ชื่อของคุณ" required />
          </div>

          <div class="form__group">
            <label for="email" class="form__label">อีเมลติดต่อ</label>
            <input type="email" name="email" id="email" class="form__input" placeholder="you@example.com" required />
          </div>

          <div class="form__group">
            <label for="message" class="form__label">ข้อความ</label>
            <textarea name="message" id="message" class="form__textarea" rows="6" placeholder="อธิบายรายละเอียดโปรเจกต์ ระบบงาน หรือระบบอัตโนมัติที่คุณต้องการ..." required></textarea>
          </div>

          <!-- Honeypot anti-spam field -->
          <div class="form__honeypot">
            <label for="_gotcha">ปล่อยช่องนี้ว่างไว้หากคุณเป็นมนุษย์</label>
            <input type="text" name="_gotcha" id="_gotcha" tabindex="-1" autocomplete="off" />
          </div>

          <div class="form__actions">
            <button type="submit" class="btn btn--primary" id="form-submit" style="width: 100%;">ส่งข้อความ</button>
          </div>

          <div class="form__status" id="form-status"></div>
        </form>
      </div>
    </div>
  </main>

  {{> footer}}

  <script type="module" src="/src/main.js"></script>
</body>
</html>
